{% extends "base.html" %}
{% block title %}RAG Q&A{% endblock %}
{% block content %}
<section class="page-head">
  <h1>RAG Q&A</h1>
</section>
<form
  class="ask-form"
  method="post"
  action="/rag/ask"
  data-async-form="true"
  data-action-url="/rag/ask"
  data-target="#rag-answer"
  data-submit-label="Ask"
>
  <textarea name="question" rows="4" minlength="3" placeholder="Ask a question over the indexed knowledge base..." required></textarea>
  <button type="submit">Ask</button>
</form>
<section id="rag-answer" class="results"></section>
{% endblock %}
