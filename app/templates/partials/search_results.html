{% if results %}
  {% for item in results %}
    <article class="result">
      <div class="result-head">
        <h2>{{ item.title }}</h2>
        <span class="badge">score {{ "%.3f"|format(item.score) }}</span>
      </div>
      <p>{{ item.snippet }}</p>
      <p class="muted">{{ item.source_label }} · chunk {{ item.chunk_index }} · distance {{ "%.3f"|format(item.distance) }}</p>
    </article>
  {% endfor %}
{% else %}
  <p class="empty">No semantic matches found.</p>
{% endif %}
